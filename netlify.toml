[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Set these in the Netlify dashboard (Site settings → Environment variables):
# NEXT_PUBLIC_RESEND_API_KEY       — from https://resend.com/api-keys
# NEXT_PUBLIC_RESEND_FROM_EMAIL    — verified sender, e.g. Perfect Love <rsvp@yourdomain.com>
